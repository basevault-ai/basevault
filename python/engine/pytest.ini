[pytest]
# Belt-and-suspenders against deadlocks (#683): a single hung test must
# FAIL loudly, not wedge the whole suite into week-old zombie processes.
# 300s is an enormous margin for the default fast unit suite (tests run
# in ms-to-low-seconds) while still capping any true hang. The opt-in
# real-LLM tiers can legitimately run longer — pass `--timeout=0` to a
# `-m integration` / `-m eval` run if a case needs it.
timeout = 300
markers =
    integration: tests that call real LLM and read real data (run with -m integration)
    eval: eval-run suites — per-stage regression + chatbot e2e (run with -m eval)
